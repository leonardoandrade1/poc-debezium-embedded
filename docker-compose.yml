services:
  mysql-monolith:
    image: mysql:8.0
    container_name: mysql-monolith
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: monolith
    ports:
      - "3307:3306"
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog_format=ROW
      --binlog_row_image=FULL
      --gtid_mode=ON
      --enforce-gtid-consistency=ON
    volumes:
      - ./infra/mysql-monolith/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-monolith-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 10

  mysql-product:
    image: mysql:8.0
    container_name: mysql-product
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: product
    ports:
      - "3308:3306"
    volumes:
      - ./infra/mysql-product/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-product-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
  
  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: kafka-ui
    depends_on: 
      - kafka
    ports:
      - "8002:8080"
    restart: always
    environment:
      - KAFKA_CLUSTERS_0_NAME=broker
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181

  app:
    build: .
    container_name: poc-debezium-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # Destination datasource (product microservice)
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-product:3306/product
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      # Debezium source (monolith)
      DEBEZIUM_SOURCE_HOST: mysql-monolith
      DEBEZIUM_SOURCE_PORT: 3306
      DEBEZIUM_SOURCE_USER: root
      DEBEZIUM_SOURCE_PASSWORD: root
      DEBEZIUM_SOURCE_DATABASE: monolith
      DEBEZIUM_SOURCE_TABLE_INCLUDE: monolith.product,monolith.orders
      # Debezium offset storage (dedicated control database)
      DEBEZIUM_OFFSET_JDBC_URL: jdbc:mysql://mysql-product:3306/debezium
      DEBEZIUM_OFFSET_JDBC_USER: root
      DEBEZIUM_OFFSET_JDBC_PASSWORD: root
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_PRODUCT: cdc.product
      KAFKA_TOPIC_ORDERS: cdc.orders
      KAFKA_CONSUMER_GROUP_ID: cdc-consumer-group
      KAFKA_CONSUMER_MAX_RETRIES: 3
      KAFKA_CONSUMER_RETRY_BACKOFF_MS: 1000
    ports:
      - "8080:8080"
    restart: on-failure
    depends_on:
      mysql-monolith:
        condition: service_healthy
      mysql-product:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  mysql-monolith-data:
  mysql-product-data:
