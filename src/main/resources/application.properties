spring.application.name=poc-debezium-embedded

# Destination datasource (product microservice) - JPA
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3308/product}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Debezium Source (monolith)
debezium.source.host=${DEBEZIUM_SOURCE_HOST:localhost}
debezium.source.port=${DEBEZIUM_SOURCE_PORT:3307}
debezium.source.user=${DEBEZIUM_SOURCE_USER:root}
debezium.source.password=${DEBEZIUM_SOURCE_PASSWORD:root}
debezium.source.database=${DEBEZIUM_SOURCE_DATABASE:monolith}
debezium.source.table.include=${DEBEZIUM_SOURCE_TABLE_INCLUDE:monolith.product,monolith.orders}

# Debezium Offset Storage (stored in destination database)
debezium.offset.jdbc.url=${DEBEZIUM_OFFSET_JDBC_URL:jdbc:mysql://localhost:3308/debezium}
debezium.offset.jdbc.user=${DEBEZIUM_OFFSET_JDBC_USER:root}
debezium.offset.jdbc.password=${DEBEZIUM_OFFSET_JDBC_PASSWORD:root}

# Kafka
kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
kafka.topic.product=cdc.product
kafka.topic.orders=cdc.orders
kafka.consumer.group-id=cdc-consumer-group
kafka.consumer.max-retries=3
kafka.consumer.retry-backoff-ms=1000